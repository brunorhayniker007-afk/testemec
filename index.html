<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Oficial - Mecânica Sul</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: url("logo.png") no-repeat center center fixed;
    background-size: cover;
    color: #fff;
    display: flex;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow-x: hidden;
}

/* camada escura */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.80);
    backdrop-filter: blur(4px);
    z-index: 0;
}

/* partículas */
.particle {
    position: fixed;
    width: 4px;
    height: 4px;
    background: #00ffcc;
    border-radius: 50%;
    opacity: 0.7;
    animation: float 10s linear infinite;
    z-index: 0;
}

@keyframes float {
    from {
        transform: translateY(100vh) translateX(0);
        opacity: 0;
    }
    20% { opacity: 1; }
    to {
        transform: translateY(-10vh) translateX(50px);
        opacity: 0;
    }
}

.container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 500px;
    background: rgba(17, 17, 17, 0.95);
    border: 1px solid #fff;
    border-radius: 15px;
    padding: 25px;
    backdrop-filter: blur(8px);
    box-shadow: 0 0 25px rgba(0,255,200,0.2);
}

/* LOGO TOPO */
.logo-topo {
    display: block;
    margin: 0 auto 15px auto;
    width: 150px;
    animation: pulse 3s infinite ease-in-out;
}

@keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.05); }
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

h2 {
    margin-top: 20px;
    margin-bottom: 10px;
    font-size: 16px;
    border-bottom: 1px solid #fff;
    padding-bottom: 5px;
}

.input-group {
    margin-bottom: 12px;
}

label {
    font-size: 14px;
    display: block;
    margin-bottom: 4px;
}

input[type="number"] {
    width: 100%;
    padding: 8px;
    background: #000;
    border: 1px solid #fff;
    color: #fff;
    border-radius: 5px;
}

.parcerias {
    margin-top: 15px;
    border: 1px solid #fff;
    padding: 10px;
    border-radius: 5px;
}

.parcerias label {
    display: block;
    margin-bottom: 5px;
    cursor: pointer;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    background: linear-gradient(90deg,#00ffcc,#00aaff);
    color: #000;
    border: none;
    font-weight: bold;
    cursor: pointer;
    border-radius: 5px;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.03);
}

.resultado {
    margin-top: 20px;
    padding: 12px;
    border: 1px solid #00ffcc;
    text-align: center;
    font-weight: bold;
    font-size: 18px;
}
</style>
</head>
<body>

<!-- Partículas -->
<script>
for (let i = 0; i < 40; i++) {
    let p = document.createElement("div");
    p.classList.add("particle");
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (6 + Math.random() * 6) + "s";
    p.style.animationDelay = Math.random() * 5 + "s";
    document.body.appendChild(p);
}
</script>

<div class="container">

<img src="logo.png" class="logo-topo">

<h1>Calculadora Oficial</h1>

<h2>🔧 Serviços</h2>

<div class="input-group">
<label>Reparo (2.500)</label>
<input type="number" id="reparo" placeholder="Quantidade">
</div>

<div class="input-group">
<label>Troca de Pneu (2.500)</label>
<input type="number" id="trocaPneu" placeholder="Quantidade">
</div>

<div class="input-group">
<label>Tuning (valor do veículo)</label>
<input type="number" id="tuningValor" placeholder="Ex: 300000">
</div>

<h2>🛒 Venda de Itens</h2>

<div class="input-group">
<label>Kit Reparo (3.500)</label>
<input type="number" id="kitReparo" placeholder="Quantidade">
</div>

<div class="input-group">
<label>Pneu (2.000)</label>
<input type="number" id="pneu" placeholder="Quantidade">
</div>

<div class="input-group">
<label>Pé de Cabra (2.500)</label>
<input type="number" id="peCabra" placeholder="Quantidade">
</div>

<div class="input-group">
<label>Corda (5.000)</label>
<input type="number" id="corda" placeholder="Quantidade">
</div>

<div class="input-group">
<label>Chave Inglesa (2.500)</label>
<input type="number" id="chaveInglesa" placeholder="Quantidade">
</div>

<h2>🤝 Parcerias</h2>

<div class="parcerias">
<label><input type="radio" name="parceria" id="pgs"> PGS (Pegasus)</label>
<label><input type="radio" name="parceria" id="gravata"> Os Gravata</label>
</div>

<button onclick="calcular()">CALCULAR TOTAL</button>

<div class="resultado" id="resultado">
Total: R$ 0
</div>

</div>

<script>
function calcular() {

let pgs = document.getElementById("pgs").checked;
let gravata = document.getElementById("gravata").checked;

let reparo = (parseFloat(document.getElementById("reparo").value) || 0) * 2500;
let trocaPneu = (parseFloat(document.getElementById("trocaPneu").value) || 0) * 2500;

let tuningBase = parseFloat(document.getElementById("tuningValor").value) || 0;
let tuningPercent = 0.50;

if (pgs) tuningPercent = 0.40;
if (gravata) tuningPercent = 0.35;

let tuning = tuningBase * tuningPercent;

let kitValor = 3500;
if (pgs || gravata) kitValor = 2000;

let kitReparo = (parseFloat(document.getElementById("kitReparo").value) || 0) * kitValor;

let pneu = (parseFloat(document.getElementById("pneu").value) || 0) * 2000;
let peCabra = (parseFloat(document.getElementById("peCabra").value) || 0) * 2500;
let corda = (parseFloat(document.getElementById("corda").value) || 0) * 5000;
let chaveInglesa = (parseFloat(document.getElementById("chaveInglesa").value) || 0) * 2500;

let total = reparo + trocaPneu + tuning + kitReparo + pneu + peCabra + corda + chaveInglesa;

document.getElementById("resultado").innerText =
"Total: R$ " + total.toLocaleString('pt-BR');
}
</script>

</body>
</html>
