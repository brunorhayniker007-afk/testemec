<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Oficial - Mecânica Sul</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

html, body {
    height: 100%;
    background: #000;
    overflow-x: hidden;
}

/* ===== VIDEO FUNDO ===== */
#bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -3;
}

/* ===== OVERLAY ===== */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.60);
    z-index: -2;
}

/* ===== PARTICULAS ===== */
#particles-js {
    position: fixed;
    inset: 0;
    z-index: -1;
}

/* ===== CENTRALIZA CONTAINER ===== */
.wrapper {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 15px;
}

.container {
    width: 100%;
    max-width: 420px;
    background: rgba(15,15,15,0.92);
    border: 1px solid #00ff88;
    border-radius: 12px;
    padding: 25px;
    box-shadow: 0 0 30px rgba(0,255,136,0.5);
    backdrop-filter: blur(8px);
    animation: fadeIn 0.8s ease-in-out;
    color: #fff;
}

/* LOGO */
.logo {
    display: flex;
    justify-content: center;
    margin-bottom: 15px;
}

.logo img {
    width: 120px;
    transition: 0.3s;
}

.logo img:hover {
    transform: scale(1.08);
}

h1 {
    text-align: center;
    margin-bottom: 20px;
    font-size: 22px;
}

h2 {
    margin-top: 20px;
    margin-bottom: 10px;
    font-size: 15px;
    border-bottom: 1px solid #00ff88;
    padding-bottom: 5px;
}

.input-group {
    margin-bottom: 12px;
}

label {
    font-size: 13px;
    display: block;
    margin-bottom: 4px;
}

input[type="number"] {
    width: 100%;
    padding: 8px;
    background: #000;
    border: 1px solid #00ff88;
    color: #fff;
    border-radius: 6px;
}

.parcerias {
    margin-top: 10px;
    border: 1px solid #00ff88;
    padding: 10px;
    border-radius: 6px;
}

.parcerias label {
    display: block;
    margin-bottom: 5px;
    cursor: pointer;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    background: #00ff88;
    color: #000;
    border: none;
    font-weight: bold;
    cursor: pointer;
    border-radius: 6px;
    transition: 0.3s;
}

button:hover {
    background: #00cc6a;
    box-shadow: 0 0 15px #00ff88;
}

.resultado {
    margin-top: 20px;
    padding: 12px;
    border: 1px solid #00ff88;
    text-align: center;
    font-weight: bold;
    border-radius: 6px;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<!-- VIDEO FUNDO -->
<video autoplay muted loop playsinline id="bg-video">
    <source src="./fundo.mp4" type="video/mp4">
</video>

<div class="overlay"></div>
<div id="particles-js"></div>

<div class="wrapper">
<div class="container">

<div class="logo">
    <img src="logo.png" alt="Logo Mecânica Sul">
</div>

<h1>Calculadora Oficial</h1>
